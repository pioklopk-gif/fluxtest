apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring # Tu zostanie zainstalowany stack
spec:
  releaseName: kube-prometheus-stack
  targetNamespace: monitoring
  interval: 5m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.4.3" # Użyj najnowszej stabilnej wersji
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: Create
    createNamespace: true
  upgrade:
    crds: CreateReplace
  values:
    # Tutaj możesz nadpisać domyślne ustawienia (np. retencję danych)
    prometheus:
      prometheusSpec:
        retention: 24h
        resources:
          requests:
            cpu: 200m
            memory: 200Mi
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi
          podMonitorNamespaceSelector: {}
          podMonitorSelector:
           matchLabels:
            app.kubernetes.io/component: monitoring
    grafana:
      adminPassword: "grafana1234"